    "DA083": { rds: false, imp_rds: "8346.48", col_rds: "",      imp_151: "", col_151: "" },
  };
  Object.keys(seedData).forEach(id => { if (state[id]) Object.assign(state[id], seedData[id]); });

  let saving = false;

  async function loadFromFirebase() {
    setStatus("🔄 Connessione a Firebase...");
    try {
      const snap = await getDoc(DOC_REF);
      if (snap.exists()) {
        const remote = snap.data();
        Object.keys(remote).forEach(id => {
          if (state[id]) Object.assign(state[id], remote[id]);
        });
        setStatus("✅ Connesso — dati sincronizzati");
      } else {
        await setDoc(DOC_REF, state);
        setStatus("✅ Dati iniziali caricati su Firebase");
      }
      render();
      onSnapshot(DOC_REF, (snap) => {
        if (!saving && snap.exists()) {
          const remote = snap.data();
          Object.keys(remote).forEach(id => {
            if (state[id]) Object.assign(state[id], remote[id]);
          });
          render();
          setStatus("🔄 Aggiornato — " + new Date().toLocaleTimeString());
        }
      });
    } catch(e) {
      setStatus("❌ Errore: " + e.message);
      render();
    }
  }

  async function saveToFirebase() {
    saving = true;
    setStatus("💾 Salvataggio...");
    try {
      await setDoc(DOC_REF, state);
      setStatus("✅ Salvato — " + new Date().toLocaleTimeString());
    } catch(e) {
      setStatus("❌ Errore salvataggio: " + e.message);
    }
    setTimeout(() => { saving = false; }, 1000);
  }

  // Salva documento su Firestore — un documento per file, con ID univoco
  async function saveDoc(stabId, base64, name, mime) {
    setStatus("💾 Caricamento documento...");
    try {
      const docId = `${stabId}_${Date.now()}`;
      const docRef = doc(db, "documenti", docId);
      await setDoc(docRef, { base64, name, mime, updatedAt: new Date().toISOString() });
      if (!docs[stabId]) docs[stabId] = [];
      docs[stabId].push({ base64, name, mime, _docId: docId });
      setStatus("✅ Documento salvato — " + new Date().toLocaleTimeString());
      updateDocCell(stabId);
    } catch(e) {
      setStatus("❌ Errore documento: " + e.message);
      if (e.message && e.message.includes("exceeds")) {
        alert("File troppo grande per Firestore (limite ~1MB). Usa un file più piccolo.");
      }
    }
  }

  async function deleteDoc(stabId, docId) {
    try {
      const docRef = doc(db, "documenti", docId);
      await setDoc(docRef, { base64: "", name: "", mime: "", updatedAt: "" });
      docs[stabId] = (docs[stabId] || []).filter(d => d._docId !== docId);
      updateDocCell(stabId);
      setStatus("🗑 Documento rimosso");
    } catch(e) {
      setStatus("❌ Errore rimozione: " + e.message);
    }
  }

  async function loadAllDocs() {
    try {
      const snap = await getDocs(collection(db, "documenti"));
      snap.forEach(d => {
        const dd = d.data();
        if (!dd.base64) return;
        // Ricava stabId togliendo il timestamp finale (es. NA031_1234567890)
        const parts = d.id.split("_");
        parts.pop();
        const stabId = parts.join("_");
        if (!docs[stabId]) docs[stabId] = [];
        docs[stabId].push({ ...dd, _docId: d.id });
      });
      Object.keys(docs).forEach(id => docs[id].sort((a,b) => a._docId > b._docId ? 1 : -1));
    } catch(e) { /* nessun documento ancora */ }
  }

  function updateDocCell(id) {
    const cell = document.querySelector(`[data-doc-cell="${id}"]`);
    if (!cell) return;
    cell.innerHTML = buildDocCell(id);
    bindDocCell(cell, id);
  }

  function buildDocCell(id) {
    const list = docs[id] || [];
    let html = `<div class="doc-list">`;
    list.forEach((d, i) => {
      const isImg = d.mime && d.mime.startsWith("image/");
      const shortName = d.name && d.name.length > 16 ? d.name.substring(0,14)+"…" : (d.name||"doc");
      html += `<div class="doc-item">
        ${isImg
          ? `<img class="doc-thumb" src="${d.base64}" alt="${d.name}">`
          : `<div class="doc-pdf-thumb">📄</div>`}
        <div class="doc-item-actions">
          <span class="doc-name" title="${d.name}">${shortName}</span>
          <div style="display:flex;gap:3px;">
            <button class="doc-view-btn" data-view-id="${id}" data-view-idx="${i}" title="Apri">🔍</button>
            <button class="doc-del-btn" data-del-stab="${id}" data-del-docid="${d._docId}" title="Rimuovi">🗑</button>
          </div>
        </div>
      </div>`;
    });
    html += `</div>
    <label class="doc-upload-btn" title="Aggiungi documento">
      📎 ${list.length === 0 ? "Allega" : "+ Aggiungi"}
      <input type="file" accept="application/pdf,image/*" style="display:none" data-upload-id="${id}">
    </label>`;
    return html;
  }

  function bindDocCell(cell, id) {
    const inp = cell.querySelector(`input[data-upload-id]`);
    if (inp) {
      inp.addEventListener("change", e => {
        const file = e.target.files[0];
        if (!file) return;
        if (file.size > 900000) {
          alert("File troppo grande (max ~900KB). Comprimi il PDF o ridimensiona l'immagine.");
          return;
        }
        const reader = new FileReader();
        reader.onload = ev => saveDoc(id, ev.target.result, file.name, file.type);
        reader.readAsDataURL(file);
      });
    }
    cell.querySelectorAll("[data-view-id]").forEach(btn => {
      btn.addEventListener("click", () => openViewer(btn.dataset.viewId, parseInt(btn.dataset.viewIdx)));
    });
    cell.querySelectorAll("[data-del-stab]").forEach(btn => {
      btn.addEventListener("click", () => {
        if (confirm("Rimuovere il documento?")) deleteDoc(btn.dataset.delStab, btn.dataset.delDocid);
      });
    });
  }

  function openViewer(id, idx) {
    const list = docs[id] || [];
    const d = list[idx];
    if (!d) return;
    const overlay = document.getElementById("doc-overlay");
    const content = document.getElementById("doc-overlay-content");
    const title = document.getElementById("doc-overlay-title");
    title.textContent = d.name || "Documento";
    if (d.mime && d.mime.startsWith("image/")) {
      content.innerHTML = `<img src="${d.base64}" style="max-width:100%;max-height:80vh;display:block;margin:auto;border-radius:4px;">`;
    } else {
      content.innerHTML = `<iframe src="${d.base64}" style="width:100%;height:80vh;border:none;border-radius:4px;"></iframe>`;
    }
    overlay.style.display = "flex";
  }

  function setStatus(msg) {
    const el = document.getElementById("status");
    if (el) el.textContent = msg;
  }

  function clClass(cl) {
    return cl==="5"?"cl5":cl==="4"?"cl4":cl==="3"?"cl3":"cl1";
  }

  function impCell(id, col, impCol) {
    const s = state[id];
    const val = s[col] || "";
    const color = s[impCol] || "";
    const stC = color === "rosso" ? "stato-rosso" : color === "verde" ? "stato-verde" : "";
    const rA = color === "rosso" ? "active" : "";
    const gA = color === "verde" ? "active" : "";
    return `<td>
      <div class="imp-wrap">
        <div class="imp-box ${stC}">
          <span class="imp-label">Importo</span>
          <div class="imp-input-row">
            <span class="imp-euro">€</span>
            <input class="imp-input" type="text" data-id="${id}" data-col="${col}" value="${val}">
          </div>
        </div>
        <div class="imp-stato">
          <button class="btn-stato rosso ${rA}" data-id="${id}" data-col="${impCol}" data-val="rosso">✗ Non pag.</button>
          <button class="btn-stato verde ${gA}" data-id="${id}" data-col="${impCol}" data-val="verde">✓ Pagato</button>
        </div>
      </div>
    </td>`;
  }

  function render() {
    const tb = document.getElementById("tbody");
    if (!tb) return;
    tb.innerHTML = "";
    let lastProv = null;
    data.forEach(([id, nome, cl, comune, prov]) => {
      if (prov !== lastProv) {
        const sep = document.createElement("tr");
        sep.className = "prov-header";
        sep.innerHTML = `<td colspan="7">📍 ${prov}</td>`;
        tb.appendChild(sep);
        lastProv = prov;
      }
      const s = state[id];
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td>
          <span class="badge ${clClass(cl)}">${id.replace('b','')} · Cl.${cl}</span>
          <span class="nome">${nome}</span>
          <div class="sub-loc">${comune} (${prov})</div>
        </td>
        <td class="cb-cell"><input type="checkbox" data-id="${id}" data-col="rds" ${s.rds?"checked":""}></td>
        ${impCell(id, "imp_rds", "col_rds")}
        <td class="doc-cell" data-doc-cell="${id}_rds">${buildDocCell(id+"_rds")}</td>
        ${impCell(id, "imp_151", "col_151")}
        <td class="doc-cell" data-doc-cell="${id}">${buildDocCell(id)}</td>
      `;
      tb.appendChild(tr);
      bindDocCell(tr.querySelector(`[data-doc-cell="${id}_rds"]`), id+"_rds");
      bindDocCell(tr.querySelector(`[data-doc-cell="${id}"]`), id);
    });

    tb.querySelectorAll("input[type=checkbox]").forEach(cb => {
      cb.addEventListener("change", e => {
        const { id, col } = e.target.dataset;
        state[id][col] = e.target.checked;
        saveToFirebase(); updateSummary();
      });
    });
    tb.querySelectorAll("input.imp-input").forEach(inp => {
      inp.addEventListener("change", e => {
        const { id, col } = e.target.dataset;
        state[id][col] = e.target.value;
        saveToFirebase();
      });
    });
    tb.querySelectorAll("button.btn-stato").forEach(btn => {
      btn.addEventListener("click", e => {
        const { id, col, val } = e.target.dataset;
        state[id][col] = state[id][col] === val ? "" : val;
        saveToFirebase();
        render();
      });
    });
    updateSummary();
    filterTable();
  }

  function updateSummary() {
    let rds = 0;
    Object.values(state).forEach(s => { if(s.rds) rds++; });
    const el = document.getElementById("summary");
    if (el) el.textContent = `${rds} / 45 con RdS ricevuta`;
  }

  function exportCSV() {
    let csv = "N. Univoco,Nome,Classe,Comune,Provincia,RdS,Imp.RdS,Imp.151\n";
    data.forEach(([id,nome,cl,comune,prov]) => {
      const s = state[id];
      csv += `"${id.replace('b','')}","${nome}","${cl}","${comune}","${prov}",${s.rds?1:0},"${s.imp_rds}","${s.imp_151}"\n`;
    });
    const a = document.createElement("a");
    a.href = "data:text/csv;charset=utf-8," + encodeURIComponent(csv);
    a.download = "stabilimenti_soglia_superiore_2026.csv";
    a.click();
  }

  window.filterTable = function() {
    const q = document.getElementById("searchInput").value.toLowerCase().trim();
    const rows = document.querySelectorAll("#tbody tr");
    let lastProvRow = null;
    rows.forEach(tr => {
      if (tr.classList.contains("prov-header")) {
        lastProvRow = tr;
        tr.style.display = "none";
      } else {
        const match = !q || tr.innerText.toLowerCase().includes(q);
        tr.style.display = match ? "" : "none";
        if (match && lastProvRow) lastProvRow.style.display = "";
      }
    });
  };

  window.clearSearch = function() {
    document.getElementById("searchInput").value = "";
    filterTable();
  };

  window.closeOverlay = function() {
    document.getElementById("doc-overlay").style.display = "none";
    document.getElementById("doc-overlay-content").innerHTML = "";
  };

  window.exportCSV = exportCSV;
  window.addEventListener("DOMContentLoaded", async () => {
    await loadAllDocs();
    await loadFromFirebase();
  });
</script>
